  function pauseBattle() { if (battle) battle.pause(); }
  function useAbility(name) { if (battle) battle.useAbility(name); }

  class BattleEngine {
    constructor(canvasId) {
      this.canvas = document.getElementById(canvasId);
      this.ctx = this.canvas.getContext('2d');
      this.t = 0; this.lastTime = performance.now();
      this.running = false; this.paused = false;
      // Defer resize to next frame so canvas has dimensions
      requestAnimationFrame(() => {
        this.resize();
        this.setupState();
        this.setupInput();
        this.loop = this.loop.bind(this);
        // Re-resize on window orientation change
        window.addEventListener('resize', () => this.resize());
        window.addEventListener('orientationchange', () => setTimeout(() => this.resize(), 100));
      });
    }
    resize() {
      const rect = this.canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      // Use fallback if rect is 0 (canvas not visible yet)
      const cssW = rect.width > 0 ? rect.width : window.innerWidth;
      const cssH = rect.height > 0 ? rect.height : window.innerHeight;
      this.canvas.width = cssW * dpr;
      this.canvas.height = cssH * dpr;
      // Reset transform before scaling to avoid accumulation
      this.ctx.setTransform(1, 0, 0, 1, 0, 0);
      this.ctx.scale(dpr, dpr);
      this.W = cssW; this.H = cssH;
      this.dpr = dpr;
    }
    setupState() {
      const s = getState();
      // Apply artifact effects
      this.artifact = selectedArtifact;
      const eff = this.artifact ? this.artifact.effect : {};
      const hpAdd = eff.hpAdd || 0;
      const hpSet = eff.hpSet || null;
      let baseHp = 3 + (s.upgrades.maxHp || 0) + hpAdd;
      if (hpSet !== null) baseHp = hpSet;
      this.ship = { x: this.W / 2, y: this.H / 2, vx: 0, vy: 0, angle: -Math.PI / 2, hp: baseHp, maxHp: baseHp, shield: (eff.noShield ? false : (s.upgrades.shield ? true : false)), size: 16, shootCooldown: 0 };
      this.plasma = []; this.drones = []; this.bullets = []; this.particles = [];
      this.kills = 0; this.plasmaCollected = 0;
      this.revivedThisRun = false;
      this.startTime = performance.now(); this.elapsedTime = 0;
      this.nextDroneSpawn = 2000; this.nextPlasmaSpawn = 500;
      this.nextGoldenDrone = 30000; // First golden drone after 30s
      this.difficulty = 0;
      this.threatLevel = 0; this.lastThreatLevel = 0;
      // Abilities: cooldowns in ms, ready when 0
      this.abilities = { emp: 0, boost: 0, magnet: 0 };
      this.abilityCooldowns = { emp: 25000, boost: 20000, magnet: 30000 };
      this.magnetActive = 0; // ms remaining
      this.boostTrail = []; // boost effect particles
      this.joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0 };
      this.bgStars = [];
      for (let i = 0; i < 80; i++) this.bgStars.push({ x: Math.random() * this.W, y: Math.random() * this.H, size: Math.random() * 1.5 + 0.3, phase: Math.random() * Math.PI * 2 });
      // Initial plasma
      for (let i = 0; i < 8; i++) this.spawnPlasma();
      document.getElementById('joyHint').classList.remove('hide');
    }
    setupInput() {
      this.canvas.style.touchAction = 'none';
      const getPos = (e) => { const rect = this.canvas.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; };
      const onDown = (e) => {
        e.preventDefault();
        if (!this.running || this.paused) return;
        const pos = getPos(e);
        this.joystick.active = true;
        this.joystick.startX = pos.x; this.joystick.startY = pos.y;
        this.joystick.dx = 0; this.joystick.dy = 0;
        document.getElementById('joyHint').classList.add('hide');
        try { this.canvas.setPointerCapture(e.pointerId); } catch (err) {}
      };
      const onMove = (e) => {
        if (!this.joystick.active) return;
        e.preventDefault();
        const pos = getPos(e);
        this.joystick.dx = pos.x - this.joystick.startX;
        this.joystick.dy = pos.y - this.joystick.startY;
      };
      const onUp = (e) => {
        this.joystick.active = false;
        this.joystick.dx = 0; this.joystick.dy = 0;
      };
      this.canvas.addEventListener('pointerdown', onDown);
      this.canvas.addEventListener('pointermove', onMove);
      this.canvas.addEventListener('pointerup', onUp);
      this.canvas.addEventListener('pointercancel', onUp);
    }
    spawnPlasma() {
      const margin = 50;
      this.plasma.push({ x: margin + Math.random() * (this.W - margin * 2), y: margin + Math.random() * (this.H - margin * 2), size: 5, phase: Math.random() * Math.PI * 2, value: 10 });
    }
    spawnDrone() {
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = Math.random() * this.W; y = -30; }
      else if (side === 1) { x = this.W + 30; y = Math.random() * this.H; }
      else if (side === 2) { x = Math.random() * this.W; y = this.H + 30; }
      else { x = -30; y = Math.random() * this.H; }
      const speed = 0.5 + this.difficulty * 0.15 + Math.random() * 0.3;
      // Elite drones from threat level 2+
      const elite = this.threatLevel >= 2 && Math.random() < (0.15 + this.threatLevel * 0.05);
      const baseHp = 1 + Math.floor(this.difficulty / 3);
      this.drones.push({ x, y, vx: 0, vy: 0, speed, size: elite ? 16 : 12, hp: elite ? baseHp * 3 : baseHp, maxHp: elite ? baseHp * 3 : baseHp, phase: Math.random() * Math.PI * 2, golden: false, elite, stunned: 0 });
    }
    onThreatLevelUp() {
      // Visual + sound cue
      SOUNDS.danger();
      vibrate([100, 50, 100]);
      showToast(currentLang === 'ru' ? `⚠️ УРОВЕНЬ УГРОЗЫ ${this.threatLevel + 1}!` : `⚠️ THREAT LEVEL ${this.threatLevel + 1}!`, 'danger');
      // Spawn burst of drones
      for (let i = 0; i < 3 + this.threatLevel; i++) this.spawnDrone();
    }
    spawnGoldenDrone() {
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = Math.random() * this.W; y = -30; }
      else if (side === 1) { x = this.W + 30; y = Math.random() * this.H; }
      else if (side === 2) { x = Math.random() * this.W; y = this.H + 30; }
      else { x = -30; y = Math.random() * this.H; }
      this.drones.push({ x, y, vx: 0, vy: 0, speed: 0.7, size: 18, hp: 5, maxHp: 5, phase: Math.random() * Math.PI * 2, golden: true });
    }
    start() {
      // If setup is deferred, wait for it
      if (!this.ship) {
        setTimeout(() => this.start(), 50);
        return;
      }
      this.running = true;
      this.lastTime = performance.now();
      requestAnimationFrame(this.loop);
    }
    stop() { this.running = false; }
    pause() {
      this.paused = !this.paused;
      if (!this.paused) { this.lastTime = performance.now(); requestAnimationFrame(this.loop); }
    }
    loop(now) {
      if (!this.running) return;
      if (this.paused) return;
      const dt = Math.min(50, now - this.lastTime);
      this.lastTime = now;
      this.t += dt;
      this.elapsedTime = (now - this.startTime) / 1000;
      this.difficulty = Math.floor(this.elapsedTime / 15);
      this.threatLevel = Math.floor(this.elapsedTime / 120); // every 2 min
      // Detect threat level transition
      if (this.threatLevel > (this.lastThreatLevel || 0)) {
        this.lastThreatLevel = this.threatLevel;
        this.onThreatLevelUp();
      }
      this.update(dt);
      this.draw();
      this.updateHUD();
      requestAnimationFrame(this.loop);
    }
    update(dt) {
      const s = getState();
      const speedUpgrade = s.upgrades.speed || 0;
      const eff = this.artifact ? this.artifact.effect : {};
      const speedMult = eff.speedMult || 1;
      // FIX: normal physics — speed in px/sec, applied via dt/1000
      const shipSpeed = (220 + speedUpgrade * 30) * speedMult; // px per second
      // Ship movement from joystick
      if (this.joystick.active) {
        const len = Math.sqrt(this.joystick.dx ** 2 + this.joystick.dy ** 2);
        if (len > 8) {
          const maxLen = 60;
          const cl = Math.min(len, maxLen);
          const intensity = cl / maxLen; // 0..1
          const nx = this.joystick.dx / len, ny = this.joystick.dy / len;
          this.ship.vx = nx * shipSpeed * intensity;
          this.ship.vy = ny * shipSpeed * intensity;
          this.ship.angle = Math.atan2(ny, nx);
        } else { this.ship.vx *= 0.85; this.ship.vy *= 0.85; }
      } else { this.ship.vx *= 0.85; this.ship.vy *= 0.85; }
      // Apply movement in px/sec
      this.ship.x += this.ship.vx * (dt / 1000);
      this.ship.y += this.ship.vy * (dt / 1000);
      this.ship.x = Math.max(this.ship.size, Math.min(this.W - this.ship.size, this.ship.x));
      this.ship.y = Math.max(this.ship.size, Math.min(this.H - this.ship.size, this.ship.y));

      // Auto-shoot
      this.ship.shootCooldown -= dt;
      const fireRateUpgrade = s.upgrades.fireRate || 0;
      const fireMult = eff.fireRateMult || 1;
      const fireRate = Math.max(100, (600 - fireRateUpgrade * 100) / fireMult);
      const noShoot = eff.noShoot || false;
      if (!noShoot && this.ship.shootCooldown <= 0 && this.drones.length > 0) {
        // Find nearest drone
        let nearest = null, minDist = Infinity;
        this.drones.forEach(d => { const dx = d.x - this.ship.x, dy = d.y - this.ship.y; const dist = Math.sqrt(dx*dx + dy*dy); if (dist < minDist) { minDist = dist; nearest = d; } });
        if (nearest && minDist < 400) {
          const angle = Math.atan2(nearest.y - this.ship.y, nearest.x - this.ship.x);
          const damageUpgrade = s.upgrades.damage || 0;
          const dmgMult = eff.dmgMult || 1;
          const damage = (1 + damageUpgrade) * dmgMult;
          if (eff.fanShot) {
            // 3-way fan
            [-0.25, 0, 0.25].forEach(off => {
              this.bullets.push({ x: this.ship.x, y: this.ship.y, vx: Math.cos(angle + off) * 0.8, vy: Math.sin(angle + off) * 0.8, life: 1500, damage });
            });
          } else {
            this.bullets.push({ x: this.ship.x, y: this.ship.y, vx: Math.cos(angle) * 0.8, vy: Math.sin(angle) * 0.8, life: 1500, damage });
          }
          this.ship.shootCooldown = fireRate;
          SOUNDS.shoot();
        }
      }

      // Spawn plasma
      this.nextPlasmaSpawn -= dt;
      if (this.nextPlasmaSpawn <= 0 && this.plasma.length < 12) { this.spawnPlasma(); this.nextPlasmaSpawn = 1500 + Math.random() * 1500; }

      // Spawn drones
      this.nextDroneSpawn -= dt;
      if (this.nextDroneSpawn <= 0) {
        const count = 1 + Math.floor(this.difficulty / 2);
        for (let i = 0; i < count; i++) this.spawnDrone();
        this.nextDroneSpawn = Math.max(800, 3000 - this.difficulty * 200);
      }

      // Spawn golden drone (rare)
      this.nextGoldenDrone -= dt;
      if (this.nextGoldenDrone <= 0) {
        this.spawnGoldenDrone();
        this.nextGoldenDrone = 45000 + Math.random() * 30000; // Every 45-75s
      }

      // Update bullets
      this.bullets = this.bullets.filter(b => {
        b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
        return b.life > 0 && b.x > -50 && b.x < this.W + 50 && b.y > -50 && b.y < this.H + 50;
      });

      // Update drones
      const radiusUpgrade = s.upgrades.radius || 0;
      const radiusMult = eff.radiusMult || 1;
      const collectRadius = (30 + radiusUpgrade * 12) * radiusMult;
      const droneSpeedMult = eff.droneSpeedMult || 1;
      this.drones.forEach(d => {
        if (d.stunned > 0) { d.stunned -= dt; d.phase += 0.02; return; }
        const dx = this.ship.x - d.x, dy = this.ship.y - d.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0) { d.vx = (dx / dist) * d.speed * droneSpeedMult; d.vy = (dy / dist) * d.speed * droneSpeedMult; }
        d.x += d.vx * dt; d.y += d.vy * dt;
        d.phase += 0.05;
        // Collision with ship
        if (dist < this.ship.size + d.size) {
          if (this.ship.shield) { this.ship.shield = false; this.spawnExplosion(d.x, d.y, '#22D3EE'); }
          else {
            this.ship.hp--;
            const lostPlasma = Math.floor(this.plasmaCollected * 0.15);
            this.plasmaCollected -= lostPlasma;
            this.spawnExplosion(this.ship.x, this.ship.y, '#F43F5E');
            SOUNDS.damage(); vibrate(80);
            if (this.ship.hp <= 0) this.endBattle();
          }
          d.hp = 0;
        }
      });

      // Bullet-drone collisions
      this.bullets.forEach(b => {
        this.drones.forEach(d => {
          if (d.hp <= 0) return;
          const dx = b.x - d.x, dy = b.y - d.y;
          if (Math.sqrt(dx*dx + dy*dy) < d.size + 4) {
            d.hp -= b.damage; b.life = 0;
            if (d.hp <= 0) {
              this.kills++;
              this.spawnExplosion(d.x, d.y, d.golden ? '#FBBF24' : '#F43F5E');
              SOUNDS.hit(); vibrate(20);
              // Drop plasma
              if (Math.random() < 0.4) this.plasma.push({ x: d.x, y: d.y, size: 5, phase: Math.random() * Math.PI * 2, value: 15 });
              // Vampire effect: heal on kill
              if (eff.vampire && this.ship.hp < this.ship.maxHp && Math.random() < 0.15) {
                this.ship.hp++;
                this.spawnCollectEffect(this.ship.x, this.ship.y);
                SOUNDS.collect();
              }
              // Golden drone drops lootbox
              if (d.golden) {
                const s2 = getState();
                s2.lootboxes = [...s2.lootboxes, { id: Date.now(), acquiredAt: Date.now() }];
                saveState(s2);
                showToast(currentLang === 'ru' ? '🎁 Золотой дрон сбит! Контейнер в Верфи!' : '🎁 Golden drone down! Container in Shipyard!', 'gold');
                SOUNDS.buy();
                vibrate([50, 50, 50]);
              }
            }
          }
        });
      });
      this.drones = this.drones.filter(d => d.hp > 0);

      // Plasma collection
      const plasmaMult = eff.plasmaMult || 1;
      this.plasma = this.plasma.filter(p => {
        const dx = p.x - this.ship.x, dy = p.y - this.ship.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < collectRadius) {
          this.plasmaCollected += Math.floor(p.value * plasmaMult);
          this.spawnCollectEffect(p.x, p.y);
          SOUNDS.collect();
          return false;
        }
        p.phase += 0.04;
        return true;
      });

      // Update particles
      this.particles = this.particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; p.vx *= 0.95; p.vy *= 0.95; return p.life > 0; });

      // Update ability cooldowns
      ['emp', 'boost', 'magnet'].forEach(ab => { if (this.abilities[ab] > 0) this.abilities[ab] = Math.max(0, this.abilities[ab] - dt); });
      // Magnet effect
      if (this.magnetActive > 0) {
        this.magnetActive -= dt;
        const magnetRange = 400;
        this.plasma.forEach(p => {
          const dx = this.ship.x - p.x, dy = this.ship.y - p.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < magnetRange && dist > 0) { p.x += (dx / dist) * 8; p.y += (dy / dist) * 8; }
        });
      }
      // Boost trail fade
      this.boostTrail = this.boostTrail.filter(t => { t.life -= 0.05; return t.life > 0; });
      this.updateAbilityUI();
    }
    useAbility(name) {
      if (this.abilities[name] > 0) return;
      this.abilities[name] = this.abilityCooldowns[name];
      if (name === 'emp') {
        // Stun all drones within 150px for 2s
        this.drones.forEach(d => { const dx = d.x - this.ship.x, dy = d.y - this.ship.y; if (Math.sqrt(dx*dx + dy*dy) < 150) d.stunned = 2000; });
        this.spawnExplosion(this.ship.x, this.ship.y, '#22D3EE');
        for (let i = 0; i < 30; i++) { const a = (i / 30) * Math.PI * 2; this.particles.push({ x: this.ship.x, y: this.ship.y, vx: Math.cos(a) * 4, vy: Math.sin(a) * 4, life: 1, color: '#22D3EE', size: 4 }); }
        SOUNDS.danger(); vibrate([50, 50, 50]);
        showToast(currentLang === 'ru' ? '⚡ EMP-ВЗРЫВ!' : '⚡ EMP BLAST!', 'cyan');
      } else if (name === 'boost') {
        // Dash forward, leave fire trail that kills drones
        const ang = this.ship.angle;
        const dashDist = 200;
        const steps = 20;
        for (let i = 0; i < steps; i++) {
          const sx = this.ship.x + Math.cos(ang) * (dashDist * i / steps);
          const sy = this.ship.y + Math.sin(ang) * (dashDist * i / steps);
          this.boostTrail.push({ x: sx, y: sy, life: 1 });
          // Kill drones in trail
          this.drones.forEach(d => { const dx = d.x - sx, dy = d.y - sy; if (Math.sqrt(dx*dx + dy*dy) < 30) { d.hp = 0; this.kills++; this.spawnExplosion(d.x, d.y, '#FBBF24'); } });
        }
        this.ship.x = Math.max(this.ship.size, Math.min(this.W - this.ship.size, this.ship.x + Math.cos(ang) * dashDist));
        this.ship.y = Math.max(this.ship.size, Math.min(this.H - this.ship.size, this.ship.y + Math.sin(ang) * dashDist));
        SOUNDS.overclock(); vibrate(100);
        showToast(currentLang === 'ru' ? '🔥 ФОРСАЖ!' : '🔥 BOOST!', 'gold');
      } else if (name === 'magnet') {
        this.magnetActive = 5000;
        SOUNDS.buy(); vibrate(60);
        showToast(currentLang === 'ru' ? '🧲 ПРИТЯЖЕНИЕ 5с!' : '🧲 MAGNET 5s!', 'cyan');
      }
    }
    updateAbilityUI() {
      ['emp', 'boost', 'magnet'].forEach(ab => {
        const btn = document.getElementById('ab' + ab.charAt(0).toUpperCase() + ab.slice(1));
        const cd = document.getElementById('ab' + ab.charAt(0).toUpperCase() + ab.slice(1) + 'Cd');
        const txt = document.getElementById('ab' + ab.charAt(0).toUpperCase() + ab.slice(1) + 'Text');
        if (!btn) return;
        if (this.abilities[ab] > 0) {
          btn.classList.remove('ready'); btn.classList.add('cooldown');
          const pct = (this.abilities[ab] / this.abilityCooldowns[ab]) * 100;
          cd.style.height = pct + '%';
          txt.style.display = 'block';
          txt.textContent = Math.ceil(this.abilities[ab] / 1000);
        } else {
          btn.classList.add('ready'); btn.classList.remove('cooldown');
          cd.style.height = '0%';
          txt.style.display = 'none';
        }
      });
      // Threat indicator
      const ti = document.getElementById('threatIndicator');
      let html = '';
      for (let i = 0; i < 5; i++) html += `<div class="ti-dot ${i <= this.threatLevel ? 'active' : ''}"></div>`;
      ti.innerHTML = html;
    }
    spawnExplosion(x, y, color) { for (let i = 0; i < 15; i++) { const a = (i / 15) * Math.PI * 2; this.particles.push({ x, y, vx: Math.cos(a) * (1 + Math.random() * 3), vy: Math.sin(a) * (1 + Math.random() * 3), life: 1, color, size: 3 }); } }
    spawnCollectEffect(x, y) { for (let i = 0; i < 6; i++) { const a = (i / 6) * Math.PI * 2; this.particles.push({ x, y, vx: Math.cos(a) * 0.5, vy: Math.sin(a) * 0.5, life: 1, color: '#22D3EE', size: 2 }); } }
    endBattle() {
      this.running = false;
      SOUNDS.gameover();
      // REVIVE: offer once per run if player has stars and hasn't used revive yet
      if (!this.revivedThisRun && this.elapsedTime > 15) {
        this.offerRevive();
        return;
      }
      this.finalizeBattle();
    }
    offerRevive() {
      const s = getState();
      document.getElementById('rvPlasma').textContent = this.plasmaCollected;
      document.getElementById('rvKills').textContent = this.kills;
      document.getElementById('rvTime').textContent = formatTime(this.elapsedTime);
      const btn = document.getElementById('rvBtn');
      btn.disabled = s.stars < 50;
      btn.innerHTML = (s.stars < 50 ? '<span data-i18n="not_enough_stars"></span>' : '<span data-i18n="revive_btn"></span>') + ' · 50 ★';
      applyI18n();
      document.getElementById('reviveOverlay').classList.add('show');
      // Countdown 10 seconds
      let countdown = 10;
      document.getElementById('rvTimer').textContent = countdown;
      this._reviveInterval = setInterval(() => {
        countdown--;
        document.getElementById('rvTimer').textContent = countdown;
        if (countdown <= 0) {
          clearInterval(this._reviveInterval);
          declineRevive();
        }
      }, 1000);
    }
    finalizeBattle() {
      const s = getState();
      const glory = this.kills * 5 + Math.floor(this.elapsedTime);
      s.plasma += this.plasmaCollected;
      s.glory += glory;
      s.totalRuns++;
      s.totalKills += this.kills;
      s.totalPlasma += this.plasmaCollected;
      // Save daily run score if this was a daily run
      if (this.isDailyRun) {
        const today = new Date().toDateString();
        if (s.dailyRunDate !== today) { s.dailyRunDate = today; s.dailyRunScore = 0; }
        if (this.plasmaCollected > s.dailyRunScore) s.dailyRunScore = this.plasmaCollected;
      }
      const score = this.plasmaCollected + this.kills * 20 + Math.floor(this.elapsedTime) * 2;
      if (score > s.bestRun) s.bestRun = score;
      updateQuestProgress('plasma', this.plasmaCollected);
      updateQuestProgress('kills', this.kills);
      updateQuestProgress('time', Math.floor(this.elapsedTime));
      updateQuestProgress('runs', 1);
      updateQuestProgress('glory', glory);
      saveState(s);
      checkStoryProgress();
      document.getElementById('grPlasma').textContent = this.plasmaCollected;
      document.getElementById('grGlory').textContent = glory;
      document.getElementById('gsKills').textContent = this.kills;
      document.getElementById('gsTime').textContent = formatTime(this.elapsedTime);
      document.getElementById('gsPlasmaCollected').textContent = this.plasmaCollected;
      setTimeout(() => switchScreen('gameover'), 600);
    }
    updateHUD() {
      document.getElementById('bhPlasma').textContent = this.plasmaCollected;
      document.getElementById('bhKills').textContent = this.kills;
      document.getElementById('bhTimer').textContent = formatTime(this.elapsedTime);
      const hpEl = document.getElementById('bhHp');
      let html = '';
      for (let i = 0; i < this.ship.maxHp; i++) html += `<div class="bh-hp-dot ${i >= this.ship.hp ? 'lost' : ''}"></div>`;
      hpEl.innerHTML = html;
    }
    draw() {
      const ctx = this.ctx;
      // Background — color shifts with threat level
      const threatColors = ['#03020A', '#0A0820', '#1A0810', '#2A0810', '#3A0810', '#4A0810'];
      const bgColor = threatColors[Math.min(this.threatLevel, threatColors.length - 1)];
      ctx.fillStyle = bgColor; ctx.fillRect(0, 0, this.W, this.H);
      // Red vignette at high threat
      if (this.threatLevel >= 2) {
        const vig = ctx.createRadialGradient(this.W/2, this.H/2, this.W/3, this.W/2, this.H/2, this.W/1.5);
        vig.addColorStop(0, 'rgba(244,63,94,0)');
        vig.addColorStop(1, `rgba(244,63,94,${0.05 + this.threatLevel * 0.03})`);
        ctx.fillStyle = vig; ctx.fillRect(0, 0, this.W, this.H);
      }
      // BG stars
      this.bgStars.forEach(s => { const tw = 0.3 + Math.sin(this.t * 0.002 + s.phase) * 0.4; ctx.fillStyle = `rgba(255,255,255,${Math.max(0, tw)})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); });
      // Nebula
      const ng = ctx.createRadialGradient(this.W * 0.3, this.H * 0.4, 0, this.W * 0.3, this.H * 0.4, this.W * 0.6); ng.addColorStop(0, 'rgba(167,139,250,0.06)'); ng.addColorStop(1, 'rgba(167,139,250,0)'); ctx.fillStyle = ng; ctx.fillRect(0, 0, this.W, this.H);
      // Plasma
      this.plasma.forEach(p => {
        const pulse = 1 + Math.sin(this.t * 0.005 + p.phase) * 0.2;
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3); grad.addColorStop(0, 'rgba(34,211,238,0.6)'); grad.addColorStop(1, 'rgba(34,211,238,0)'); ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#22D3EE'; ctx.shadowColor = '#22D3EE'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * pulse, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
      });
      // Bullets
      this.bullets.forEach(b => { ctx.fillStyle = '#A78BFA'; ctx.shadowColor = '#A78BFA'; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; });
      // Drones
      this.drones.forEach(d => {
        const pulse = 1 + Math.sin(d.phase) * 0.15;
        let color, glowColor;
        if (d.golden) { color = '#FBBF24'; glowColor = 'rgba(251,191,36,0.6)'; }
        else if (d.elite) { color = '#FB923C'; glowColor = 'rgba(251,146,60,0.6)'; } // orange elite
        else { color = '#F43F5E'; glowColor = 'rgba(244,63,94,0.5)'; }
        const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.size * 3);
        grad.addColorStop(0, glowColor);
        grad.addColorStop(1, d.golden ? 'rgba(251,191,36,0)' : (d.elite ? 'rgba(251,146,60,0)' : 'rgba(244,63,94,0)'));
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(d.x, d.y, d.size * 3, 0, Math.PI * 2); ctx.fill();
        // Stunned = blue tint
        if (d.stunned > 0) { ctx.fillStyle = '#22D3EE'; ctx.shadowColor = '#22D3EE'; }
        else { ctx.fillStyle = color; ctx.shadowColor = color; }
        ctx.shadowBlur = d.golden ? 20 : (d.elite ? 16 : 12);
        // Elite: armor ring
        if (d.elite) { ctx.strokeStyle = '#FB923C'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(d.x, d.y, d.size * pulse * 1.3, 0, Math.PI * 2); ctx.stroke(); }
        ctx.beginPath(); ctx.arc(d.x, d.y, d.size * pulse, 0, Math.PI * 2); ctx.fill();
        // Inner core
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(d.x, d.y, d.size * 0.4, 0, Math.PI * 2); ctx.fill();
        // Golden drone: star marker
        if (d.golden) {
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < 5; i++) { const a = (i * 2 * Math.PI / 5) - Math.PI / 2; const x = d.x + Math.cos(a) * d.size * 1.2; const y = d.y + Math.sin(a) * d.size * 1.2; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
          ctx.closePath(); ctx.stroke();
        }
        ctx.shadowBlur = 0;
      });
      // Ship
      ctx.save();
      ctx.translate(this.ship.x, this.ship.y);
      ctx.rotate(this.ship.angle + Math.PI / 2);
      // Engine trail
      const trailGrad = ctx.createLinearGradient(0, 15, 0, 50); trailGrad.addColorStop(0, 'rgba(167,139,250,0.8)'); trailGrad.addColorStop(1, 'rgba(167,139,250,0)'); ctx.fillStyle = trailGrad;
      ctx.beginPath(); ctx.moveTo(-8, 15); ctx.lineTo(8, 15); ctx.lineTo(4, 45); ctx.lineTo(-4, 45); ctx.closePath(); ctx.fill();
      // Body
      ctx.fillStyle = '#A78BFA'; ctx.shadowColor = '#A78BFA'; ctx.shadowBlur = 16;
      ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(14, 12); ctx.lineTo(6, 16); ctx.lineTo(-6, 16); ctx.lineTo(-14, 12); ctx.closePath(); ctx.fill();
      // Cockpit
      ctx.fillStyle = '#22D3EE'; ctx.shadowColor = '#22D3EE'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(0, -4, 5, 0, Math.PI * 2); ctx.fill();
      // Shield
      if (this.ship.shield) { ctx.strokeStyle = 'rgba(34,211,238,0.5)'; ctx.lineWidth = 2; ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI * 2); ctx.stroke(); }
      ctx.shadowBlur = 0;
      ctx.restore();
      // Joystick visual — hidden (player just drags anywhere)
      // (no rendering, ship follows finger silently)
      // Boost trail
      this.boostTrail.forEach(t => {
        ctx.fillStyle = `rgba(251, 191, 36, ${t.life * 0.6})`;
        ctx.shadowColor = '#FBBF24'; ctx.shadowBlur = 16;
        ctx.beginPath(); ctx.arc(t.x, t.y, 12 * t.life, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
      });
      // Magnet aura
      if (this.magnetActive > 0) {
        ctx.strokeStyle = `rgba(244, 114, 182, ${0.3 + Math.sin(this.t * 0.01) * 0.2})`; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(this.ship.x, this.ship.y, 80, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = `rgba(244, 114, 182, ${0.15})`;
        ctx.beginPath(); ctx.arc(this.ship.x, this.ship.y, 160, 0, Math.PI * 2); ctx.stroke();
      }
      // Particles
      this.particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); });
      ctx.globalAlpha = 1;
    }
  }

  function formatTime(sec) { const m = Math.floor(sec / 60); const s = Math.floor(sec % 60); return `${m}:${s.toString().padStart(2, '0')}`; }

  // ============ HANGAR PREVIEW ============
  let hangarAnimId = null;
  function renderHangar() {
    if (hangarAnimId) cancelAnimationFrame(hangarAnimId);
    const canvas = document.getElementById('hangarCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const s = getState();
    const upgrades = s.upgrades || {};
    const t0 = performance.now();
    const animate = () => {
      const t = performance.now() - t0;
      ctx.clearRect(0, 0, W, H);
      // Background stars
      ctx.fillStyle = '#03020A'; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 40; i++) {
        const x = (i * 73 % W); const y = (i * 137 % H);
        const tw = 0.3 + Math.sin(t * 0.002 + i) * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${tw})`;
        ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI * 2); ctx.fill();
      }
      // Nebula
      const ng = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W/2);
      ng.addColorStop(0, 'rgba(167,139,250,0.08)'); ng.addColorStop(1, 'rgba(167,139,250,0)');
      ctx.fillStyle = ng; ctx.beginPath(); ctx.arc(W/2, H/2, W/2, 0, Math.PI * 2); ctx.fill();
      // Ship in center, hovering
      const cx = W/2, cy = H/2 + Math.sin(t * 0.002) * 8;
      const totalUp = Object.values(upgrades).reduce((a, b) => a + b, 0);
      // Color shifts with tier
      let bodyColor = '#A78BFA', cockpitColor = '#22D3EE';
      if (totalUp >= 20) { bodyColor = '#FBBF24'; cockpitColor = '#F43F5E'; }
      else if (totalUp >= 12) { bodyColor = '#F472B6'; cockpitColor = '#FBBF24'; }
      else if (totalUp >= 7) { bodyColor = '#22D3EE'; cockpitColor = '#A78BFA'; }
      else if (totalUp >= 3) { bodyColor = '#A78BFA'; cockpitColor = '#22D3EE'; }
      // Engine trail
      const trailGrad = ctx.createLinearGradient(cx, cy + 30, cx, cy + 100);
      trailGrad.addColorStop(0, bodyColor + 'CC'); trailGrad.addColorStop(1, bodyColor + '00');
      ctx.fillStyle = trailGrad;
      ctx.beginPath();
      const trailW = 14 + (upgrades.speed || 0) * 2;
      ctx.moveTo(cx - trailW, cy + 30); ctx.lineTo(cx + trailW, cy + 30);
      ctx.lineTo(cx + trailW * 0.5, cy + 100 + Math.sin(t * 0.01) * 8);
      ctx.lineTo(cx - trailW * 0.5, cy + 100 + Math.sin(t * 0.01) * 8);
      ctx.closePath(); ctx.fill();
      // Ship body
      ctx.fillStyle = bodyColor; ctx.shadowColor = bodyColor; ctx.shadowBlur = 24;
      const sizeScale = 1 + totalUp * 0.03;
      ctx.beginPath();
      ctx.moveTo(cx, cy - 35 * sizeScale);
      ctx.lineTo(cx + 25 * sizeScale, cy + 20 * sizeScale);
      ctx.lineTo(cx + 12 * sizeScale, cy + 28 * sizeScale);
      ctx.lineTo(cx - 12 * sizeScale, cy + 28 * sizeScale);
      ctx.lineTo(cx - 25 * sizeScale, cy + 20 * sizeScale);
      ctx.closePath(); ctx.fill();
      // Wing extensions (if speed upgrade)
      if (upgrades.speed > 0) {
        ctx.fillStyle = bodyColor + 'AA';
        ctx.beginPath();
        ctx.moveTo(cx - 25 * sizeScale, cy + 5); ctx.lineTo(cx - 40 * sizeScale, cy + 15);
        ctx.lineTo(cx - 35 * sizeScale, cy + 25 * sizeScale); ctx.lineTo(cx - 25 * sizeScale, cy + 20 * sizeScale);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx + 25 * sizeScale, cy + 5); ctx.lineTo(cx + 40 * sizeScale, cy + 15);
        ctx.lineTo(cx + 35 * sizeScale, cy + 25 * sizeScale); ctx.lineTo(cx + 25 * sizeScale, cy + 20 * sizeScale);
        ctx.closePath(); ctx.fill();
      }
      // Cannons (if damage upgrade)
      if (upgrades.damage > 0) {
        ctx.fillStyle = '#F43F5E'; ctx.shadowColor = '#F43F5E'; ctx.shadowBlur = 8;
        for (let i = 0; i < Math.min(upgrades.damage, 4); i++) {
          const off = (i - (Math.min(upgrades.damage, 4) - 1) / 2) * 8;
          ctx.fillRect(cx + off - 2, cy - 20 * sizeScale, 4, 12);
        }
      }
      // Shield bubble (if shield)
      if (upgrades.shield) {
        ctx.strokeStyle = 'rgba(34,211,238,0.4)'; ctx.lineWidth = 2; ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(cx, cy, 50 * sizeScale, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = 'rgba(34,211,238,0.2)';
        ctx.beginPath(); ctx.arc(cx, cy, 55 * sizeScale, 0, Math.PI * 2); ctx.stroke();
      }
      // Cockpit
      ctx.fillStyle = cockpitColor; ctx.shadowColor = cockpitColor; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(cx, cy - 8 * sizeScale, 7 * sizeScale, 0, Math.PI * 2); ctx.fill();
      // HP bars (if maxHp upgrade)
      if (upgrades.maxHp > 0) {
        ctx.shadowBlur = 0;
        for (let i = 0; i < upgrades.maxHp; i++) {
          ctx.fillStyle = '#F43F5E';
          ctx.fillRect(cx - 20 + i * 8, cy + 35 * sizeScale, 6, 4);
        }
      }
      ctx.shadowBlur = 0;
      hangarAnimId = requestAnimationFrame(animate);
    };
    animate();
  }

  // ============ SHIPYARD ============
  function getUpgradeCost(up, currentLevel) { return Math.floor(up.baseCost * Math.pow(up.costMult, currentLevel)); }
  function renderShipyard() {
    const s = getState();
    document.getElementById('syBalance').textContent = Math.floor(s.plasma) + ' 💎';
    // Update hangar stats
    const dmgUp = s.upgrades.damage || 0;
    const fireUp = s.upgrades.fireRate || 0;
    const radUp = s.upgrades.radius || 0;
    const hpUp = s.upgrades.maxHp || 0;
    document.getElementById('hstFire').textContent = (1 + fireUp);
    document.getElementById('hstDmg').textContent = (1 + dmgUp);
    document.getElementById('hstRad').textContent = (30 + radUp * 12);
    document.getElementById('hstHp').textContent = (3 + hpUp);
    // Tier based on total upgrades
    const totalUp = Object.values(s.upgrades).reduce((a, b) => a + b, 0);
    let tierName = 'Tier I · Искатель';
    if (totalUp >= 20) tierName = 'Tier V · Бог Вселенной';
    else if (totalUp >= 12) tierName = 'Tier IV · Галактический Лорд';
    else if (totalUp >= 7) tierName = 'Tier III · Адмирал';
    else if (totalUp >= 3) tierName = 'Tier II · Капитан';
    document.getElementById('hangarTier').textContent = tierName;
    // Render hangar canvas
    renderHangar();
    const list = document.getElementById('syList');
    // Lootbox section (if any)
    let lootHtml = '';
    if (s.lootboxes && s.lootboxes.length > 0) {
      lootHtml = s.lootboxes.map((lb, i) => {
        const elapsed = Date.now() - lb.acquiredAt;
        const ready = elapsed >= 3 * 3600 * 1000;
        const timeLeft = ready ? 0 : (3 * 3600 * 1000 - elapsed);
        const timeStr = ready ? (currentLang === 'ru' ? 'ГОТОВ' : 'READY') : formatLootTime(timeLeft);
        return `<div class="sy-card" style="border-color:rgba(251,191,36,0.3);background:linear-gradient(135deg,rgba(251,191,36,0.06),rgba(10,8,32,0.8));">
          <div class="sy-icon" style="background:linear-gradient(135deg,rgba(251,191,36,0.2),rgba(251,191,36,0.05));border-color:rgba(251,191,36,0.3);">📦</div>
          <div class="sy-body">
            <div class="sy-name">${currentLang === 'ru' ? 'Секретный груз #' + (i+1) : 'Secret cargo #' + (i+1)}</div>
            <div class="sy-desc">${currentLang === 'ru' ? 'Контейнер с Золотого Дрона' : 'Container from Golden Drone'}</div>
            <div class="sy-level"><div style="font-size:10px;color:${ready ? '#34D399' : '#FBBF24'};font-weight:800;letter-spacing:0.1em;">${timeStr}</div></div>
          </div>
          <div class="sy-action">
            <div class="sy-cost" style="color:#FBBF24;">100 ★</div>
            <button class="sy-buy" style="background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#03020A;" ${s.stars < 100 ? 'disabled' : ''} onclick="openLootbox(${i})">${currentLang === 'ru' ? 'ОТКРЫТЬ' : 'OPEN'}</button>
          </div>
        </div>`;
      }).join('');
    }
    // Upgrades
    const upHtml = UPGRADES.map(up => {
      const level = s.upgrades[up.id] || 0;
      const maxed = level >= up.maxLevel;
      const cost = maxed ? 0 : getUpgradeCost(up, level);
      // Referral lock for levels 4-5 (except shield which is level 1 max)
      const needsRefs = !maxed && level >= 3 && up.maxLevel >= 4 && s.invited < 3;
      const canBuy = !maxed && !needsRefs && s.plasma >= cost;
      let dots = '';
      for (let i = 0; i < up.maxLevel; i++) dots += `<div class="sy-dot ${i < level ? 'filled' : ''}"></div>`;
      let actionHtml = '';
      if (maxed) actionHtml = '<div class="sy-cost" style="color:#34D399">MAX</div><button class="sy-buy maxed">✓</button>';
      else if (needsRefs) actionHtml = `<div class="sy-cost">${cost} 💎</div><div class="sy-lock-badge">🔒 ${s.invited}/3</div><button class="sy-buy" disabled onclick="showToast(t('need_referrals'),'danger')">${currentLang === 'ru' ? 'ЗАБЛОКИРОВАНО' : 'LOCKED'}</button>`;
      else actionHtml = `<div class="sy-cost">${cost} 💎</div><button class="sy-buy" ${canBuy ? '' : 'disabled'} onclick="buyUpgrade('${up.id}')">${currentLang === 'ru' ? 'КУПИТЬ' : 'BUY'}</button>`;
      return `<div class="sy-card">
        <div class="sy-icon">${up.icon}</div>
        <div class="sy-body">
          <div class="sy-name">${up.name[currentLang]}</div>
          <div class="sy-desc">${up.desc[currentLang]}</div>
          <div class="sy-level">${dots}</div>
        </div>
        <div class="sy-action">${actionHtml}</div>
      </div>`;
    }).join('');
    list.innerHTML = lootHtml + upHtml;
  }
  function formatLootTime(ms) {
    const h = Math.floor(ms / 3600000); const m = Math.floor((ms % 3600000) / 60000); const s = Math.floor((ms % 60000) / 1000);
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }
  function buyUpgrade(id) {
    const up = UPGRADES.find(u => u.id === id);
    if (!up) return;
    const s = getState();
    const level = s.upgrades[id] || 0;
    if (level >= up.maxLevel) return;
    const cost = getUpgradeCost(up, level);
    if (s.plasma < cost) { showToast(t('not_enough'), 'danger'); return; }
    s.plasma -= cost;
    s.upgrades[id] = level + 1;
    saveState(s);
    SOUNDS.buy();
    updateQuestProgress('upgrades', 1);
    showToast(t('purchased'), 'success');
    renderShipyard(); renderHome();
    checkStoryProgress();
  }

  // ============ QUESTS ============
  let questTab = 'daily';
  function switchQuestTab(tab) {
    questTab = tab;
    document.querySelectorAll('.qu-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    renderQuests();
  }
  function renderQuests() {
    const s = getState();
    const list = document.getElementById('quList');
    let quests, claimed, progress;
    if (questTab === 'daily') { quests = DAILY_QUESTS; claimed = s.dailyClaimed; progress = s.dailyProgress; }
    else if (questTab === 'weekly') { quests = WEEKLY_QUESTS; claimed = s.weeklyClaimed; progress = s.weeklyProgress; }
    else { quests = STORY_QUESTS; claimed = s.storyClaimed; progress = null; }
    list.innerHTML = quests.map(q => {
      const isClaimed = claimed.includes(q.id);
      let prog = 0;
      if (questTab === 'story') {
        const st = getState();
        if (q.type === 'runs') prog = st.totalRuns;
        else if (q.type === 'kills') prog = st.totalKills;
        else if (q.type === 'time') prog = st.bestRun > 0 ? 90 : 0; // simplified
        else if (q.type === 'upgrades') prog = Object.values(st.upgrades).reduce((a, b) => a + b, 0);
        else if (q.type === 'glory') prog = st.glory;
      } else {
        prog = (progress && progress[q.id]) || 0;
      }
      const done = prog >= q.target;
      const canClaim = done && !isClaimed;
      const pct = Math.min(100, (prog / q.target) * 100);
      const rewardText = q.reward.type === 'plasma' ? `+${q.reward.amount} 💎` : `+${q.reward.amount} ★`;
      return `<div class="qu-card ${isClaimed ? 'done' : ''}">
        <div class="qu-top">
          <div class="qu-icon">${q.icon}</div>
          <div class="qu-body"><div class="qu-name">${q.text[currentLang]}</div><div class="qu-reward">${rewardText}</div></div>
          ${isClaimed ? '<div class="qu-check">✓</div>' : ''}
        </div>
        <div class="qu-progress-row">
          <div class="qu-bar"><div class="qu-bar-fill" style="width:${pct}%;"></div></div>
          <div class="qu-progress-text">${Math.min(prog, q.target)}/${q.target}</div>
        </div>
        ${canClaim ? `<button class="go-btn go-btn-primary" style="margin-top:10px;font-size:12px;padding:10px;" onclick="claimQuest('${q.id}')">${currentLang === 'ru' ? 'ЗАБРАТЬ' : 'CLAIM'}</button>` : ''}
      </div>`;
    }).join('');
  }
  function claimQuest(qid) {
    const s = getState();
    let quests, claimedArr, key;
    if (questTab === 'daily') { quests = DAILY_QUESTS; claimedArr = s.dailyClaimed; key = 'dailyClaimed'; }
    else if (questTab === 'weekly') { quests = WEEKLY_QUESTS; claimedArr = s.weeklyClaimed; key = 'weeklyClaimed'; }
    else { quests = STORY_QUESTS; claimedArr = s.storyClaimed; key = 'storyClaimed'; }
    const q = quests.find(x => x.id === qid);
    if (!q || claimedArr.includes(qid)) return;
    if (q.reward.type === 'plasma') s.plasma += q.reward.amount;
    else if (q.reward.type === 'stars') s.stars += q.reward.amount;
    s[key] = [...claimedArr, qid];
    saveState(s);
    SOUNDS.quest();
    showToast(t('quest_done') + ' +' + q.reward.amount + (q.reward.type === 'plasma' ? ' 💎' : ' ★'), 'success');
    renderQuests(); renderHome(); updateBadges();
  }
  function updateQuestProgress(type, amount) {
    const s = getState();
    const addProg = (quests, progObj, claimedKey) => {
      quests.forEach(q => {
        if (q.type === type && !s[claimedKey].includes(q.id)) {
          if (type === 'runs' || type === 'upgrades') progObj[q.id] = (progObj[q.id] || 0) + amount;
          else progObj[q.id] = Math.max(progObj[q.id] || 0, amount);
        }
      });
    };
    addProg(DAILY_QUESTS, s.dailyProgress, 'dailyClaimed');
    addProg(WEEKLY_QUESTS, s.weeklyProgress, 'weeklyClaimed');
    saveState(s);
    updateBadges();
  }
  function updateBadges() {
    const s = getState();
    // Quest badge — count claimable
    let claimable = 0;
    const checkClaimable = (quests, claimed, progress) => {
      quests.forEach(q => {
        if (claimed.includes(q.id)) return;
        let prog = 0;
        if (progress) prog = (progress[q.id] || 0);
        else {
          if (q.type === 'runs') prog = s.totalRuns;
          else if (q.type === 'kills') prog = s.totalKills;
          else if (q.type === 'upgrades') prog = Object.values(s.upgrades).reduce((a, b) => a + b, 0);
          else if (q.type === 'glory') prog = s.glory;
          else if (q.type === 'time') prog = s.bestRun > 0 ? 90 : 0;
        }
        if (prog >= q.target) claimable++;
      });
    };
    checkClaimable(DAILY_QUESTS, s.dailyClaimed, s.dailyProgress);
    checkClaimable(WEEKLY_QUESTS, s.weeklyClaimed, s.weeklyProgress);
    checkClaimable(STORY_QUESTS, s.storyClaimed, null);
    const qb1 = document.getElementById('qBadge'); const qb2 = document.getElementById('navQuestBadge');
    if (claimable > 0) { qb1.classList.add('show'); qb1.textContent = claimable; qb2.classList.add('show'); qb2.textContent = claimable; }
    else { qb1.classList.remove('show'); qb2.classList.remove('show'); }
    // Comms badge
    let unread = 0;
    CHAPTERS.forEach(ch => { if (s.unlockedChapters.includes(ch.num)) ch.messages.forEach((m, i) => { if (!s.readMessages.includes(`${ch.num}-${i}`)) unread++; }); });
    const cb1 = document.getElementById('cmBadge'); const cb2 = document.getElementById('navCommsBadge');
    if (unread > 0) { cb1.classList.add('show'); cb2.classList.add('show'); } else { cb1.classList.remove('show'); cb2.classList.remove('show'); }
  }

  // ============ STORY ============
  function checkStoryProgress() {
    const s = getState();
    CHAPTERS.forEach(ch => {
      if (!s.unlockedChapters.includes(ch.num) && ch.trigger(s)) {
        s.unlockedChapters = [...s.unlockedChapters, ch.num];
        saveState(s);
        showToast(t('chapter_unlocked') + ' ' + ch.num, 'cyan');
      }
    });
    updateBadges();
  }
  function renderComms() {
    const s = getState();
    const list = document.getElementById('cmList');
    let html = '';
    CHAPTERS.forEach(ch => {
      if (!s.unlockedChapters.includes(ch.num)) return;
      html += `<div class="cm-chapter"><div class="cm-chapter-num">${(currentLang === 'ru' ? 'ГЛАВА' : 'CHAPTER')} ${ch.num}</div><div class="cm-chapter-name">${ch.name[currentLang]}</div></div>`;
      ch.messages.forEach((msg, i) => {
        let sender = '', cls = '', avatar = '';
        if (msg.from === 'kira') { sender = 'КИРА'; cls = 'kira'; avatar = '👩‍🚀'; }
        else if (msg.from === 'watchers') { sender = 'НАБЛЮДАТЕЛИ'; cls = 'watchers'; avatar = '👁'; }
        else { sender = currentLang === 'ru' ? 'КОРАБЛЬ' : 'SHIP'; cls = 'system'; avatar = '🚀'; }
        html += `<div class="cm-msg ${cls}"><div class="cm-avatar ${cls}">${avatar}</div><div class="cm-sender ${cls}">${sender}</div><div class="cm-text">${msg.text[currentLang]}</div></div>`;
      });
    });
    list.innerHTML = html || `<div style="text-align:center;padding:60px 16px;color:#6B6B8C;font-style:italic;">${currentLang === 'ru' ? 'Тишина в эфире.' : 'Silence on the air.'}</div>`;
  }
  function markMessagesRead() {
    const s = getState();
    let newRead = [...s.readMessages];
    CHAPTERS.forEach(ch => { if (s.unlockedChapters.includes(ch.num)) ch.messages.forEach((m, i) => { const id = `${ch.num}-${i}`; if (!newRead.includes(id)) newRead.push(id); }); });
    s.readMessages = newRead; saveState(s); updateBadges();
  }

  // ============ FAQ ============
  function renderFAQ() {
    const list = document.getElementById('fqList');
    const items = ['q1','q2','q3','q4','q5','q6','q7'];
    list.innerHTML = items.map((q, i) => `<div class="fq-item" id="fq${i}" onclick="toggleFAQ(${i})"><div class="fq-q"><span>${I18N[currentLang].faq[q]}</span><span class="fq-q-arrow">▼</span></div><div class="fq-a">${I18N[currentLang].faq['a' + q.slice(1)].replace(/\n/g, '<br>')}</div></div>`).join('');
  }
  function toggleFAQ(i) { document.getElementById('fq' + i).classList.toggle('open'); }

  // ============ SETTINGS ============
  function toggleSetting(key, el) {
    if (key === 'sound') { soundOn = !soundOn; el.classList.toggle('on', soundOn); localStorage.setItem('vd_sound', soundOn ? '1' : '0'); }
    else if (key === 'vibration') { vibrationOn = !vibrationOn; el.classList.toggle('on', vibrationOn); localStorage.setItem('vd_vibration', vibrationOn ? '1' : '0'); }
  }
  function resetProgress() {
    if (!confirm(currentLang === 'ru' ? 'Сбросить весь прогресс?' : 'Reset all progress?')) return;
    Object.keys(localStorage).filter(k => k.startsWith('vd_')).forEach(k => localStorage.removeItem(k));
    location.reload();
  }

  // ============ TOAST ============
  function showToast(msg, type = '') { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast ' + type; el.classList.add('show'); clearTimeout(el._tm); el._tm = setTimeout(() => el.classList.remove('show'), 2400); }

  // ============ REVIVE / LOOTBOX / REFERRALS ============
  function revive() {
    const s = getState();
    if (s.stars < 50) { showToast(t('not_enough_stars'), 'danger'); return; }
    s.stars -= 50;
    saveState(s);
    if (battle) {
      battle.revivedThisRun = true;
      battle.ship.hp = battle.ship.maxHp;
      battle.ship.shield = true;
      battle.running = true;
      battle.lastTime = performance.now();
      clearInterval(battle._reviveInterval);
      document.getElementById('reviveOverlay').classList.remove('show');
      // Clear nearby drones
      battle.drones = battle.drones.filter(d => {
        const dx = d.x - battle.ship.x, dy = d.y - battle.ship.y;
        return Math.sqrt(dx*dx + dy*dy) > 150;
      });
      battle.spawnExplosion(battle.ship.x, battle.ship.y, '#FBBF24');
      SOUNDS.buy();
      requestAnimationFrame(battle.loop);
    }
  }
  function declineRevive() {
    if (battle) {
      clearInterval(battle._reviveInterval);
      document.getElementById('reviveOverlay').classList.remove('show');
      battle.finalizeBattle();
    }
  }
  function openLootbox(index) {
    const s = getState();
    if (!s.lootboxes || !s.lootboxes[index]) return;
    const lb = s.lootboxes[index];
    const elapsed = Date.now() - lb.acquiredAt;
    const ready = elapsed >= 3 * 3600 * 1000;
    // Show lootbox modal
    document.getElementById('lootResult').style.display = 'none';
    document.getElementById('lootActions').style.display = 'flex';
    const timerEl = document.getElementById('lootTimer');
    const instantBtn = document.getElementById('lootInstantBtn');
    const freeBtn = document.getElementById('lootFreeBtn');
    if (ready) {
      timerEl.style.display = 'none';
      freeBtn.disabled = false;
      freeBtn.textContent = currentLang === 'ru' ? 'ОТКРЫТЬ БЕСПЛАТНО' : 'OPEN FREE';
    } else {
      timerEl.style.display = 'block';
      timerEl.textContent = t('loot_waiting') + ' ' + formatLootTime(3 * 3600 * 1000 - elapsed);
      freeBtn.disabled = true;
      freeBtn.textContent = currentLang === 'ru' ? 'Откроется через ' + formatLootTime(3 * 3600 * 1000 - elapsed) : 'Opens in ' + formatLootTime(3 * 3600 * 1000 - elapsed);
    }
    instantBtn.disabled = s.stars < 100;
    instantBtn.innerHTML = (s.stars < 100 ? '<span>' + t('not_enough_stars') + '</span>' : '<span data-i18n="loot_instant"></span>') + ' · 100 ★';
    applyI18n();
    document.getElementById('lootOverlay').classList.add('show');
    document.getElementById('lootOverlay').dataset.index = index;
    // Update timer every second
    if (!ready) {
      document.getElementById('lootOverlay')._timer = setInterval(() => {
        const elapsed2 = Date.now() - lb.acquiredAt;
        if (elapsed2 >= 3 * 3600 * 1000) {
          clearInterval(document.getElementById('lootOverlay')._timer);
          timerEl.style.display = 'none';
          freeBtn.disabled = false;
          freeBtn.textContent = currentLang === 'ru' ? 'ОТКРЫТЬ БЕСПЛАТНО' : 'OPEN FREE';
        } else {
          timerEl.textContent = t('loot_waiting') + ' ' + formatLootTime(3 * 3600 * 1000 - elapsed2);
          freeBtn.textContent = currentLang === 'ru' ? 'Откроется через ' + formatLootTime(3 * 3600 * 1000 - elapsed2) : 'Opens in ' + formatLootTime(3 * 3600 * 1000 - elapsed2);
        }
      }, 1000);
    }
  }
  function openLootInstant() {
    const s = getState();
    if (s.stars < 100) { showToast(t('not_enough_stars'), 'danger'); return; }
    s.stars -= 100;
    claimLootbox();
  }
  function openLootFree() {
    claimLootbox();
  }
  function claimLootbox() {
    const overlay = document.getElementById('lootOverlay');
    const index = parseInt(overlay.dataset.index);
    const s = getState();
    if (!s.lootboxes || !s.lootboxes[index]) return;
    // Remove lootbox
    s.lootboxes.splice(index, 1);
    // Generate reward
    const rewards = [
      { type: 'plasma', amount: 500, label: '+500 💎', icon: '💎' },
      { type: 'plasma', amount: 2000, label: '+2000 💎', icon: '💎' },
      { type: 'plasma', amount: 5000, label: '+5000 💎', icon: '💎' },
      { type: 'stars', amount: 20, label: '+20 ★', icon: '⭐' },
      { type: 'stars', amount: 50, label: '+50 ★', icon: '⭐' },
      { type: 'stars', amount: 100, label: '+100 ★', icon: '⭐' },
      { type: 'skin', amount: 0, label: currentLang === 'ru' ? 'СКИН КОРАБЛЯ!' : 'SHIP SKIN!', icon: '🎨' }
    ];
    const reward = rewards[Math.floor(Math.random() * rewards.length)];
    if (reward.type === 'plasma') s.plasma += reward.amount;
    else if (reward.type === 'stars') s.stars += reward.amount;
    saveState(s);
    SOUNDS.buy();
    vibrate([50, 50, 100]);
    // Show result
    clearInterval(overlay._timer);
    document.getElementById('lootResult').style.display = 'block';
    document.getElementById('lootResult').innerHTML = `${reward.icon}<br><span style="font-size:22px;">${reward.label}</span>`;
    document.getElementById('lootActions').style.display = 'none';
    setTimeout(() => {
      closeLoot();
      renderShipyard();
      renderHome();
    }, 2500);
  }
  function closeLoot() {
    const overlay = document.getElementById('lootOverlay');
    clearInterval(overlay._timer);
    overlay.classList.remove('show');
  }
  function copyRefLink() {
    const input = document.getElementById('rfLink');
    input.select(); input.setSelectionRange(0, 99999);
    try { navigator.clipboard.writeText(input.value); } catch (e) { document.execCommand('copy'); }
    showToast(t('ref_copied'), 'cyan');
    // Simulate referral for demo (1 per copy, max 30)
    const s = getState();
    if (s.invited < 30) {
      s.invited++;
      saveState(s);
      renderReferrals();
      renderShipyard();
      showToast(t('ref_invited'), 'success');
    }
  }
  function renderReferrals() {
    const s = getState();
    document.getElementById('rfInvited').textContent = s.invited;
    document.getElementById('rfNeeded').textContent = Math.max(0, 3 - s.invited);
  }

  // ============ DAILY RUN ============
  function getDailySeed() {
    const d = new Date();
    return parseInt(`${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`);
  }
  function getDailyLeaderboard() {
    // Fake competitors + player's score
    const seed = getDailySeed();
    const names = ['DragonSlayer', 'QueenOfVoid', 'NebulaHunter', 'StarReaper', 'VoidWalker', 'PlasmaKing', 'DarkComet', 'GhostShip'];
    const fakeScores = [45200, 38900, 32100, 27500, 21800, 16400, 11200, 7600];
    const s = getState();
    const myScore = s.dailyRunScore || 0;
    const all = [...names.map((n, i) => ({ name: n, score: fakeScores[i], isMe: false })), { name: s.invited > 0 ? 'Ты' : 'You', score: myScore, isMe: true }];
    all.sort((a, b) => b.score - a.score);
    return all;
  }
  function renderDailyRun() {
    const d = new Date();
    const dateStr = d.toLocaleDateString(currentLang === 'ru' ? 'ru-RU' : 'en-US', { day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('drDate').textContent = dateStr + ' · ' + t('dr_seed') + ': ' + getDailySeed();
    const lb = document.getElementById('drLeaderboard');
    const list = getDailyLeaderboard();
    lb.innerHTML = list.map((p, i) => {
      let cls = 'nw-reward';
      if (p.isMe) cls += ' unlocked';
      let rankCls = '';
      if (i === 0) rankCls = 'style="background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(10,8,32,0.8));border-color:rgba(255,215,0,0.4);"';
      else if (i === 1) rankCls = 'style="background:linear-gradient(135deg,rgba(192,192,192,0.1),rgba(10,8,32,0.8));border-color:rgba(192,192,192,0.3);"';
      else if (i === 2) rankCls = 'style="background:linear-gradient(135deg,rgba(205,127,50,0.1),rgba(10,8,32,0.8));border-color:rgba(205,127,50,0.3);"';
      const rankColor = i === 0 ? '#FFD700' : (i === 1 ? '#C0C0C0' : (i === 2 ? '#CD7F32' : '#6B6B8C'));
      return `<div class="nw-reward ${p.isMe ? 'unlocked' : ''}" ${rankCls}>
        <div class="nw-reward-icon" style="font-size:18px;color:${rankColor};font-weight:900;width:24px;text-align:center;">${i+1}</div>
        <div class="nw-reward-body"><div class="nw-reward-name" style="color:${p.isMe ? 'var(--neon)' : '#F0EBFF'}">${p.name}${p.isMe ? ' (' + (currentLang === 'ru' ? 'ты' : 'you') + ')' : ''}</div></div>
        <div class="nw-reward-count" style="color:${p.isMe ? 'var(--neon)' : 'var(--gold)'};min-width:auto;">${p.score.toLocaleString()} 💎</div>
      </div>`;
    }).join('');
  }
  function startDailyRun() {
    initAudio();
    showLaunchAnimation(() => {
      switchScreen('battle');
      if (battle) battle.stop();
      battle = new BattleEngine('battleCanvas');
      battle.isDailyRun = true;
      battle.dailySeed = getDailySeed();
      battle.start();
    });
  }

  // ============ INIT ============
  const savedLang = localStorage.getItem('vd_lang');
  if (savedLang) currentLang = savedLang;
  const savedSound = localStorage.getItem('vd_sound');
  if (savedSound !== null) soundOn = savedSound === '1';
  const savedVib = localStorage.getItem('vd_vibration');
  if (savedVib !== null) vibrationOn = savedVib === '1';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
  applyI18n();

  if (sessionStorage.getItem('vd_entered')) { document.getElementById('onboarding').style.display = 'none'; document.getElementById('app').classList.add('show'); checkDailyReset(); renderAll(); checkStoryProgress(); }
  else { sessionStorage.setItem('vd_entered', '1'); }
</script>
