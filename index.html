<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#03020A">
<title>LETUCHKA — Прорыв блокады</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; min-height: 100vh; background: #03020A; color: #C7D2FE; font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; user-select: none; -webkit-user-select: none; font-weight: 700; }
  ::selection { background: #A78BFA; color: #03020A; }
  .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace; letter-spacing: 0.05em; }
  :root { --bg: #03020A; --bg-card: #0A0820; --border: rgba(167, 139, 250, 0.15); --text: #C7D2FE; --text-muted: #6B6B8C; --neon: #A78BFA; --neon-cyan: #22D3EE; --neon-pink: #F472B6; --gold: #FBBF24; --danger: #F43F5E; --success: #34D399; }

  /* ONBOARDING */
  #onboarding { position: fixed; inset: 0; z-index: 100; background: radial-gradient(ellipse at center, #14102E 0%, #03020A 70%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; transition: opacity 0.6s ease; overflow: hidden; }
  #onboarding::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(2px 2px at 20% 30%, white, transparent), radial-gradient(1px 1px at 60% 70%, white, transparent), radial-gradient(1px 1px at 80% 10%, white, transparent), radial-gradient(2px 2px at 90% 60%, white, transparent), radial-gradient(1px 1px at 33% 80%, white, transparent), radial-gradient(1px 1px at 50% 50%, white, transparent), radial-gradient(1px 1px at 15% 65%, white, transparent), radial-gradient(1px 1px at 75% 25%, white, transparent); opacity: 0.5; pointer-events: none; animation: twinkle 4s ease-in-out infinite; }
  @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
  #onboarding::after { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(167, 139, 250, 0.2), transparent 70%); pointer-events: none; }
  #onboarding.hide { opacity: 0; pointer-events: none; }
  .lang-switcher { position: absolute; top: 20px; right: 20px; z-index: 110; display: flex; gap: 4px; padding: 4px; background: rgba(167, 139, 250, 0.05); border-radius: 999px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.15); }
  .lang-btn { background: transparent; border: none; color: #6B6B8C; padding: 6px 14px; font-size: 12px; font-weight: 800; font-family: inherit; cursor: pointer; border-radius: 999px; transition: all 0.25s ease; }
  .lang-btn.active { background: var(--neon); color: #03020A; }
  .ob-logo { font-size: 14px; letter-spacing: 0.6em; color: var(--neon); opacity: 0; transform: translateY(20px); transition: all 1s ease; margin-bottom: 24px; font-weight: 800; position: relative; z-index: 2; text-shadow: 0 0 16px rgba(167,139,250,0.6); }
  .ob-logo.show { opacity: 1; transform: translateY(0); }
  .ob-ship-wrap { width: 200px; height: 200px; margin-bottom: 24px; opacity: 0; transform: scale(0.7); transition: all 1.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; z-index: 2; }
  .ob-ship-wrap.show { opacity: 1; transform: scale(1); }
  .ob-ship-wrap canvas { width: 100%; height: 100%; }
  .ob-title { font-size: clamp(34px, 9vw, 52px); line-height: 1; letter-spacing: -0.02em; color: #F0EBFF; opacity: 0; transform: translateY(20px); transition: all 1s ease; margin-bottom: 18px; font-weight: 900; position: relative; z-index: 2; }
  .ob-title.show { opacity: 1; transform: translateY(0); }
  .ob-title em { color: var(--neon); font-style: normal; text-shadow: 0 0 20px rgba(167,139,250,0.5); }
  .ob-sub { font-size: clamp(13px, 3.8vw, 15px); color: #8A8AB0; max-width: 380px; line-height: 1.6; opacity: 0; transition: opacity 1s ease; margin-bottom: 32px; font-weight: 600; position: relative; z-index: 2; }
  .ob-sub.show { opacity: 1; }
  .ob-sub b { color: var(--neon); font-weight: 800; }
  .ob-begin { background: linear-gradient(135deg, var(--neon), #7C3AED); color: #03020A; border: none; padding: 18px 56px; font-size: 15px; font-weight: 900; cursor: pointer; opacity: 0; transition: opacity 1s ease, transform 0.2s ease, box-shadow 0.3s ease; font-family: inherit; border-radius: 999px; letter-spacing: 0.2em; position: relative; z-index: 2; text-transform: uppercase; box-shadow: 0 10px 30px rgba(167,139,250,0.4); }
  .ob-begin.show { opacity: 1; }
  .ob-begin:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(167,139,250,0.6); }

  /* APP */
  #app { position: fixed; inset: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.6s ease; background: radial-gradient(ellipse at top, #14102E 0%, #03020A 60%); }
  #app.show { opacity: 1; }

  .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 40; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; background: rgba(3, 2, 10, 0.92); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-bottom: 1px solid rgba(167, 139, 250, 0.12); }
  .topbar-logo { font-size: 13px; font-weight: 900; color: var(--neon); letter-spacing: 0.15em; text-shadow: 0 0 12px rgba(167,139,250,0.4); }
  .topbar-title-badge { background: rgba(34, 211, 238, 0.08); padding: 5px 10px; border-radius: 999px; border: 1px solid rgba(34, 211, 238, 0.2); font-size: 9px; font-weight: 800; color: var(--neon-cyan); letter-spacing: 0.08em; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .topbar-pill { display: flex; align-items: center; gap: 4px; background: rgba(251, 191, 36, 0.08); padding: 5px 10px; border-radius: 999px; border: 1px solid rgba(251, 191, 36, 0.2); font-size: 11px; font-weight: 800; color: var(--gold); }

  .screens-wrap { flex: 1; position: relative; overflow: hidden; }
  .screen { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; -ms-overflow-style: none; scrollbar-width: none; padding: 70px 0 100px; }
  .screen::-webkit-scrollbar { display: none; }
  .screen.active { opacity: 1; pointer-events: auto; }

  /* HOME */
  #home { display: flex; flex-direction: column; align-items: center; padding-top: 70px; }
  .home-stats { width: 100%; max-width: 540px; padding: 0 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .hs-card { background: rgba(10, 8, 32, 0.7); border: 1px solid rgba(167, 139, 250, 0.12); border-radius: 16px; padding: 14px 8px; text-align: center; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .hs-icon { font-size: 18px; margin-bottom: 4px; }
  .hs-value { font-size: 18px; color: var(--neon); font-weight: 900; line-height: 1; }
  .hs-value.gold { color: var(--gold); }
  .hs-value.cyan { color: var(--neon-cyan); }
  .hs-label { font-size: 9px; color: #6B6B8C; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  .home-launch { width: 100%; max-width: 540px; padding: 0 14px; margin-bottom: 20px; }
  .launch-btn { width: 100%; background: linear-gradient(135deg, var(--neon), #7C3AED); color: #03020A; border: none; padding: 28px 20px; font-size: 22px; font-weight: 900; cursor: pointer; font-family: inherit; border-radius: 24px; letter-spacing: 0.15em; text-transform: uppercase; box-shadow: 0 16px 40px rgba(167,139,250,0.4), inset 0 2px 0 rgba(255,255,255,0.2); transition: all 0.25s ease; position: relative; overflow: hidden; }
  .launch-btn:hover { transform: translateY(-3px); box-shadow: 0 22px 50px rgba(167,139,250,0.5); }
  .launch-btn:active { transform: translateY(0); }
  .launch-btn-icon { font-size: 32px; display: block; margin-bottom: 6px; }
  .launch-btn::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 50%); animation: launchGlow 3s ease-in-out infinite; pointer-events: none; }
  @keyframes launchGlow { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }

  .home-quick { width: 100%; max-width: 540px; padding: 0 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
  .hq-btn { background: rgba(10, 8, 32, 0.7); border: 1px solid rgba(167, 139, 250, 0.15); padding: 14px 4px; cursor: pointer; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; border-radius: 16px; transition: all 0.25s ease; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: relative; }
  .hq-btn:hover { background: rgba(167, 139, 250, 0.1); border-color: var(--neon); transform: translateY(-2px); }
  .hq-btn-icon { font-size: 22px; }
  .hq-btn-label { font-size: 10px; font-weight: 800; color: var(--text); letter-spacing: 0.05em; }
  .hq-badge { position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; font-size: 10px; font-weight: 800; display: none; align-items: center; justify-content: center; }
  .hq-badge.show { display: flex; }
  .hq-badge.cyan { background: var(--neon-cyan); color: #03020A; }

  .home-mission { width: 100%; max-width: 540px; padding: 0 14px; }
  .hm-card { background: linear-gradient(135deg, rgba(34,211,238,0.08), rgba(10,8,32,0.8)); border: 1px solid rgba(34, 211, 238, 0.2); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .hm-icon { font-size: 22px; }
  .hm-body { flex: 1; }
  .hm-title { font-size: 12px; font-weight: 800; color: #F0EBFF; }
  .hm-progress { font-size: 10px; color: #8A8AB0; margin-top: 3px; }
  .hm-bar { height: 4px; background: rgba(34,211,238,0.1); border-radius: 999px; margin-top: 6px; overflow: hidden; }
  .hm-bar-fill { height: 100%; background: var(--neon-cyan); border-radius: 999px; box-shadow: 0 0 6px var(--neon-cyan); }

  /* LAUNCH ANIMATION */
  #launch-overlay { position: fixed; inset: 0; background: #03020A; z-index: 150; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  #launch-overlay.show { opacity: 1; pointer-events: auto; }
  #launch-overlay canvas { width: 100%; height: 100%; position: absolute; inset: 0; }
  .launch-text { font-size: 18px; font-weight: 900; color: var(--neon); letter-spacing: 0.5em; text-transform: uppercase; position: relative; z-index: 2; text-shadow: 0 0 20px rgba(167,139,250,0.6); animation: launchTextPulse 0.8s ease-in-out infinite; }
  @keyframes launchTextPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

  /* BATTLE */
  #battle { padding: 0; }
  #battle.active { overflow: hidden; }
  .battle-canvas-wrap { position: absolute; inset: 0; }
  .battle-canvas-wrap canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  .battle-hud { position: absolute; top: 60px; left: 0; right: 0; padding: 0 14px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 5; }
  .bh-left, .bh-right { display: flex; flex-direction: column; gap: 6px; }
  .bh-card { background: rgba(3, 2, 10, 0.7); border: 1px solid rgba(167, 139, 250, 0.2); padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 800; color: var(--text); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; gap: 6px; }
  .bh-card.gold { color: var(--gold); }
  .bh-card.danger { color: var(--danger); border-color: rgba(244,63,94,0.3); }
  .bh-hp { display: flex; gap: 3px; }
  .bh-hp-dot { width: 12px; height: 12px; border-radius: 4px; background: var(--danger); box-shadow: 0 0 8px rgba(244,63,94,0.5); }
  .bh-hp-dot.lost { background: rgba(244,63,94,0.15); box-shadow: none; }
  .bh-timer { font-family: 'SF Mono', monospace; }

  .battle-joyhint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(3, 2, 10, 0.85); padding: 8px 16px; border-radius: 999px; font-size: 11px; color: #8A8AB0; font-weight: 700; border: 1px solid rgba(167, 139, 250, 0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); pointer-events: none; z-index: 4; transition: opacity 0.5s ease; }
  .battle-joyhint.hide { opacity: 0; }

  .battle-pause { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(3, 2, 10, 0.7); border: 1px solid rgba(167, 139, 250, 0.2); width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 6; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); font-size: 16px; color: var(--text); }
  .battle-pause:active { transform: translateX(-50%) scale(0.95); }

  /* GAME OVER */
  #gameover { display: flex; flex-direction: column; align-items: center; padding-top: 70px; }
  .go-icon { font-size: 64px; margin-bottom: 12px; animation: goPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes goPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .go-title { font-size: 32px; font-weight: 900; color: var(--danger); margin-bottom: 4px; letter-spacing: -0.01em; text-shadow: 0 0 20px rgba(244,63,94,0.4); }
  .go-sub { font-size: 13px; color: #8A8AB0; font-weight: 600; margin-bottom: 20px; text-align: center; }
  .go-rewards { width: 100%; max-width: 540px; padding: 0 14px; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gr-card { background: rgba(10, 8, 32, 0.8); border: 1px solid rgba(167, 139, 250, 0.15); border-radius: 16px; padding: 14px; text-align: center; }
  .gr-icon { font-size: 22px; margin-bottom: 4px; }
  .gr-value { font-size: 22px; font-weight: 900; color: var(--neon); }
  .gr-value.gold { color: var(--gold); }
  .gr-label { font-size: 10px; color: #6B6B8C; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  .go-stats { width: 100%; max-width: 540px; padding: 0 14px; margin-bottom: 16px; }
  .gs-card { background: rgba(10, 8, 32, 0.8); border: 1px solid rgba(167, 139, 250, 0.12); border-radius: 16px; padding: 14px 16px; }
  .gs-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(167,139,250,0.05); }
  .gs-row:last-child { border-bottom: none; }
  .gs-label { color: #8A8AB0; font-weight: 700; }
  .gs-value { color: var(--text); font-weight: 800; }
  .gs-value.gold { color: var(--gold); }
  .gs-value.cyan { color: var(--neon-cyan); }

  .go-actions { width: 100%; max-width: 540px; padding: 0 14px; display: flex; flex-direction: column; gap: 10px; }
  .go-btn { padding: 16px; font-size: 14px; font-weight: 900; cursor: pointer; border: none; font-family: inherit; border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.25s ease; }
  .go-btn-primary { background: linear-gradient(135deg, var(--neon), #7C3AED); color: #03020A; box-shadow: 0 8px 24px rgba(167,139,250,0.4); }
  .go-btn-primary:hover { transform: translateY(-2px); }
  .go-btn-secondary { background: rgba(10, 8, 32, 0.8); color: var(--text); border: 1px solid rgba(167,139,250,0.15); }
  .go-btn-ghost { background: transparent; color: #6B6B8C; }

  /* SHIPYARD */
  #shipyard { padding-top: 70px; }
  .sy-header { text-align: center; margin-bottom: 16px; padding: 0 16px; }
  .sy-title { font-size: 26px; font-weight: 900; color: #F0EBFF; margin-bottom: 4px; }
  .sy-title em { color: var(--neon); font-style: normal; }
  .sy-sub { font-size: 11px; color: #6B6B8C; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
  .sy-balance { max-width: 540px; margin: 0 auto 16px; padding: 0 16px; }
  .sy-balance-card { background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(10,8,32,0.8)); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 16px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
  .sy-balance-label { font-size: 10px; color: #6B6B8C; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; }
  .sy-balance-value { font-size: 22px; color: var(--neon); font-weight: 900; }
  .sy-list { max-width: 540px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
  .sy-card { background: rgba(10, 8, 32, 0.8); border: 1px solid rgba(167, 139, 250, 0.12); border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px; }
  .sy-icon { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(167,139,250,0.05)); border: 1px solid rgba(167,139,250,0.3); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .sy-body { flex: 1; min-width: 0; }
  .sy-name { font-size: 14px; font-weight: 800; color: #F0EBFF; }
  .sy-desc { font-size: 11px; color: #8A8AB0; margin-top: 2px; }
  .sy-level { display: flex; gap: 3px; margin-top: 6px; }
  .sy-dot { width: 14px; height: 5px; border-radius: 999px; background: rgba(167,139,250,0.1); }
  .sy-dot.filled { background: var(--neon); box-shadow: 0 0 6px rgba(167,139,250,0.5); }
  .sy-action { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .sy-cost { font-size: 12px; font-weight: 800; color: var(--neon); }
  .sy-buy { background: var(--neon); color: #03020A; border: none; padding: 8px 14px; font-size: 11px; font-weight: 900; cursor: pointer; font-family: inherit; border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; }
  .sy-buy:disabled { background: rgba(167,139,250,0.15); color: #6B6B8C; cursor: not-allowed; }
  .sy-buy.maxed { background: rgba(52, 211, 153, 0.15); color: var(--success); cursor: default; }

  /* QUESTS */
  #quests { padding-top: 70px; }
  .qu-header { text-align: center; margin-bottom: 16px; padding: 0 16px; }
  .qu-title { font-size: 26px; font-weight: 900; color: #F0EBFF; margin-bottom: 4px; }
  .qu-title em { color: var(--neon-cyan); font-style: normal; }
  .qu-sub { font-size: 11px; color: #6B6B8C; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
  .qu-tabs { max-width: 540px; margin: 0 auto 16px; padding: 0 16px; display: flex; gap: 6px; background: rgba(10, 8, 32, 0.6); padding: 4px; border-radius: 999px; border: 1px solid rgba(167, 139, 250, 0.1); }
  .qu-tab { flex: 1; background: transparent; border: none; color: #6B6B8C; padding: 10px; font-size: 12px; font-weight: 800; cursor: pointer; border-radius: 999px; transition: all 0.25s ease; font-family: inherit; }
  .qu-tab.active { background: linear-gradient(135deg, var(--neon-cyan), #0891B2); color: #03020A; }
  .qu-list { max-width: 540px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
  .qu-card { background: rgba(10, 8, 32, 0.8); border: 1px solid rgba(167, 139, 250, 0.12); border-radius: 16px; padding: 14px; }
  .qu-card.done { opacity: 0.6; border-color: rgba(52, 211, 153, 0.3); }
  .qu-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .qu-icon { font-size: 22px; }
  .qu-body { flex: 1; }
  .qu-name { font-size: 13px; font-weight: 800; color: #F0EBFF; }
  .qu-reward { font-size: 11px; color: var(--gold); font-weight: 800; }
  .qu-progress-row { display: flex; align-items: center; gap: 8px; }
  .qu-bar { flex: 1; height: 5px; background: rgba(167,139,250,0.08); border-radius: 999px; overflow: hidden; }
  .qu-bar-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon)); border-radius: 999px; transition: width 0.5s ease; }
  .qu-progress-text { font-size: 10px; color: #8A8AB0; font-weight: 700; min-width: 50px; text-align: right; }
  .qu-check { color: var(--success); font-size: 22px; font-weight: 900; }

  /* COMMS */
  #comms { padding-top: 70px; }
  .cm-header { text-align: center; margin-bottom: 16px; padding: 0 16px; }
  .cm-title { font-size: 26px; font-weight: 900; color: #F0EBFF; margin-bottom: 4px; }
  .cm-title em { color: var(--neon-cyan); font-style: normal; }
  .cm-sub { font-size: 11px; color: #6B6B8C; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
  .cm-list { max-width: 540px; margin: 0 auto; padding: 0 16px; }
  .cm-chapter { padding: 12px 16px; background: linear-gradient(135deg, rgba(34,211,238,0.1), rgba(10,8,32,0.8)); border: 1px solid rgba(34, 211, 238, 0.3); border-radius: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .cm-chapter-num { font-size: 10px; color: var(--neon-cyan); font-weight: 800; letter-spacing: 0.2em; }
  .cm-chapter-name { font-size: 14px; color: #F0EBFF; font-weight: 800; flex: 1; }
  .cm-msg { background: rgba(10, 8, 32, 0.8); border: 1px solid rgba(167, 139, 250, 0.15); border-radius: 18px 18px 18px 4px; padding: 14px 16px; margin-bottom: 8px; margin-left: 32px; position: relative; }

  /* REVIVE MODAL */

  /* LOOTBOX MODAL */

  /* REFERRAL SCREEN */

  .rf-link-btn { background: var(--neon); color: #03020A; border: none; padding: 10px 18px; font-size: 12px; font-weight: 900; cursor: pointer; font-family: inherit; border-radius: 12px; }

  /* BATTLE ABILITIES */

  .ab-btn { width: 56px; height: 56px; border-radius: 18px; border: 2px solid rgba(167, 139, 250, 0.3); background: rgba(3, 2, 10, 0.85); backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; font-size: 26px; position: relative; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); overflow: hidden; }
  .ab-btn:active { transform: scale(0.88); }

  .ab-btn.magnet.ready { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(244,114,182,0.5), inset 0 1px 0 rgba(255,255,255,0.1); }
  .ab-btn:disabled, .ab-btn.cooldown { opacity: 0.45; }

  .ab-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 800; color: #6B6B8C; letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; pointer-events: none; }

  /* ============ UNIQUE PREMIUM POLISH ============ */
  /* Corner brackets for cards — signature element */
  .corner-frame { position: relative; }
  .corner-frame::before, .corner-frame::after { content: ''; position: absolute; width: 12px; height: 12px; border: 2px solid var(--neon); pointer-events: none; opacity: 0.6; }
  .corner-frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
  .corner-frame::after { bottom: -1px; right: -1px; border-left: none; border-top: none; border-bottom-right-radius: 8px; }

  /* Animated gradient text */
  .gradient-text { background: linear-gradient(135deg, var(--neon) 0%, var(--neon-cyan) 50%, var(--neon-pink) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 200%; animation: gradientShift 4s ease-in-out infinite; }
  @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  /* Premium button shine */
  .shine-btn { position: relative; overflow: hidden; }
  .shine-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent); animation: shine 3s ease-in-out infinite; pointer-events: none; }
  @keyframes shine { 0% { left: -100%; } 50%, 100% { left: 200%; } }

  /* Pulsing glow ring for important elements */
  .pulse-ring { animation: pulseRing 2s ease-in-out infinite; }
  @keyframes pulseRing { 0%, 100% { box-shadow: 0 0 0 0 rgba(167, 139, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(167, 139, 250, 0); } }

  /* Hexagonal accent */
  .hex-accent { width: 28px; height: 28px; background: linear-gradient(135deg, var(--neon), var(--neon-cyan)); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: inline-flex; align-items: center; justify-content: center; }

  /* Scanline overlay for sci-fi feel */
  .scanline { position: relative; }
  .scanline::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(167, 139, 250, 0.03) 2px, rgba(167, 139, 250, 0.03) 4px); pointer-events: none; border-radius: inherit; z-index: 1; }

  /* Premium card with layered depth */
  .premium-card { background: linear-gradient(135deg, rgba(20, 16, 46, 0.9) 0%, rgba(10, 8, 32, 0.95) 100%); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 0 1px rgba(167, 139, 250, 0.05); position: relative; }

  /* Top stat cards with unique design */
  .hs-card { background: linear-gradient(180deg, rgba(20, 16, 46, 0.9) 0%, rgba(10, 8, 32, 0.95) 100%); border: 1px solid rgba(167, 139, 250, 0.15); border-radius: 16px; padding: 14px 8px; text-align: center; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Launch button — hero element with depth */
  .launch-btn { background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 50%, #22D3EE 100%); background-size: 200% 200%; animation: gradientShift 6s ease-in-out infinite; color: #03020A; border: none; padding: 28px 20px; font-size: 22px; font-weight: 900; cursor: pointer; font-family: inherit; border-radius: 24px; letter-spacing: 0.15em; text-transform: uppercase; box-shadow: 0 16px 40px rgba(124, 58, 237, 0.4), 0 8px 20px rgba(34, 211, 238, 0.2), inset 0 2px 0 rgba(255,255,255,0.3), inset 0 -2px 0 rgba(0,0,0,0.2); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; overflow: hidden; }

  .launch-btn-icon { font-size: 32px; display: block; margin-bottom: 6px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

      const trailGrad = ctx.createLinearGradient(cx, cy + 20, cx, cy + 80);
      trailGrad.addColorStop(0, 'rgba(167,139,250,0.8)'); trailGrad.addColorStop(1, 'rgba(167,139,250,0)');
      ctx.fillStyle = trailGrad;
      ctx.beginPath(); ctx.moveTo(cx - 12, cy + 20); ctx.lineTo(cx + 12, cy + 20); ctx.lineTo(cx + 6, cy + 80 + Math.sin(t * 0.01) * 5); ctx.lineTo(cx - 6, cy + 80 + Math.sin(t * 0.01) * 5); ctx.closePath(); ctx.fill();
      // Ship body
      ctx.fillStyle = '#A78BFA'; ctx.shadowColor = '#A78BFA'; ctx.shadowBlur = 20;
      ctx.beginPath(); ctx.moveTo(cx, cy - 25); ctx.lineTo(cx + 18, cy + 15); ctx.lineTo(cx + 8, cy + 20); ctx.lineTo(cx - 8, cy + 20); ctx.lineTo(cx - 18, cy + 15); ctx.closePath(); ctx.fill();
      // Cockpit
      ctx.fillStyle = '#22D3EE'; ctx.shadowColor = '#22D3EE'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(cx, cy - 5, 6, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      obAnimId = requestAnimationFrame(animate);
    };
    animate();
  }, 600);
  setTimeout(() => document.getElementById('obTitle').classList.add('show'), 1400);
  setTimeout(() => document.getElementById('obSub').classList.add('show'), 2200);
  setTimeout(() => document.getElementById('obBegin').classList.add('show'), 3000);

  function enterApp() {
    initAudio();
    document.getElementById('onboarding').classList.add('hide');
    if (obAnimId) cancelAnimationFrame(obAnimId);
    setTimeout(() => { document.getElementById('onboarding').style.display = 'none'; document.getElementById('app').classList.add('show'); checkDailyReset(); renderAll(); checkStoryProgress(); }, 600);
  }

      document.getElementById('hmBar').style.width = '100%';

  // ============ LAUNCH ANIMATION ============
  function showLaunchAnimation(callback) {
    const overlay = document.getElementById('launch-overlay');
    const canvas = document.getElementById('launchCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    overlay.classList.add('show');
    document.getElementById('launchText').textContent = currentLang === 'ru' ? 'ПРЫЖОК...' : 'JUMPING...';
    let t = 0;
    const stars = [];
    for (let i = 0; i < 100; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, z: Math.random() * 1000 + 1 });
    const anim = () => {
      t++;
      ctx.fillStyle = 'rgba(3, 2, 10, 0.3)';
      ctx.fillRect(0, 0, W, H);
      stars.forEach(s => {
        s.z -= 20;
        if (s.z <= 0) { s.z = 1000; s.x = Math.random() * W; s.y = Math.random() * H; }
        const k = 200 / s.z;
        const x = s.x * k + W/2 * (1 - k);
        const y = s.y * k + H/2 * (1 - k);
        const size = (1 - s.z / 1000) * 4;
        ctx.fillStyle = `rgba(167, 139, 250, ${1 - s.z / 1000})`;
        ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();
      });
      if (t < 60) requestAnimationFrame(anim);
      else { overlay.classList.remove('show'); callback(); }
    };
    anim();
  }

  // ============ BATTLE ============

  function showArtifactSelection(callback) {
